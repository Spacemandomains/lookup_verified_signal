<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signal Verified | Success</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white flex flex-col items-center justify-center min-h-screen p-6">
    <div class="max-w-2xl w-full bg-slate-800 rounded-2xl p-8 shadow-2xl border border-blue-500/30">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-green-500/20 text-green-400 rounded-full mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                </svg>
            </div>
            <h1 class="text-3xl font-bold">Payment Verified</h1>
            <p class="text-slate-400 mt-2">Unlocking High-Fidelity Signal...</p>
        </div>

        <div id="signal-container" class="bg-black/50 rounded-xl p-6 font-mono text-sm overflow-x-auto border border-slate-700">
            <div class="animate-pulse flex space-x-4">
                <div class="flex-1 space-y-4 py-1">
                    <div class="h-4 bg-slate-700 rounded w-3/4"></div>
                    <div class="space-y-2">
                        <div class="h-4 bg-slate-700 rounded"></div>
                        <div class="h-4 bg-slate-700 rounded w-5/6"></div>
                    </div>
                </div>
            </div>
        </div>

        <button onclick="window.location.href='/'" class="mt-8 w-full py-3 bg-slate-700 hover:bg-slate-600 rounded-lg font-medium transition">
            Return to Registry
        </button>
    </div>

    <script>
        async function unlockSignal() {
            const params = new URLSearchParams(window.location.search);
            const sessionId = params.get('session_id');
            const container = document.getElementById('signal-container');

            if (!sessionId) {
                container.innerHTML = '<span class="text-red-400 text-center block">Error: No session ID found. Please contact support.</span>';
                return;
            }

            try {
                const response = await fetch('/api', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        jsonrpc: "2.0",
                        id: "unlock-request",
                        method: "tools/call",
                        params: { 
                            arguments: { 
                                name: "wilfred_l_lee_jr", 
                                payment_intent_id: sessionId 
                            } 
                        }
                    })
                });
                
                const data = await response.json();
                container.innerHTML = `<pre class="text-blue-400">${JSON.stringify(data.result.content[0].text, null, 2)}</pre>`;
            } catch (err) {
                container.innerHTML = '<span class="text-red-400 block text-center">Failed to resolve signal. Ensure payment was processed.</span>';
            }
        }

        window.onload = unlockSignal;
    </script>
</body>
</html>
